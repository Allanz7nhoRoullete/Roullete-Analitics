<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Roleta Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎯 Roleta Europeia - Tracker</h1>

<div id="roleta"></div>

<h2>📜 Histórico</h2>
<div id="historico"></div>

<h2>📊 Análise (últimos 30)</h2>

<div class="painel">

  <div class="bloco">
    <h3>Regiões</h3>
    <pre id="regioes"></pre>
  </div>

  <div class="bloco">
    <h3>Dúzias</h3>
    <pre id="duzias"></pre>
  </div>

  <div class="bloco">
    <h3>Terminais</h3>
    <pre id="terminais"></pre>
  </div>

  <div class="bloco">
    <h3>Camuflados</h3>
    <pre id="camuflados"></pre>
  </div>

  <div class="bloco">
    <h3>Colunas Modulares</h3>
    <pre id="colunas"></pre>
  </div>

  <div class="bloco">
    <h3>Irmãos de Cor</h3>
    <pre id="irmaos"></pre>
  </div>

  <div class="bloco">
    <h3>Singulares</h3>
    <pre id="singulares"></pre>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
